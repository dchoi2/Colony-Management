# Render.com Blueprint — describes how to host the Colony Manager online.
# When you connect this repo to Render as a "Blueprint", Render reads this
# file and sets up BOTH a shared database and the web app automatically.

databases:
  - name: colony-db
    plan: free          # free shared PostgreSQL database
    databaseName: colony
    user: colony

services:
  - type: web
    name: colony-manager
    runtime: python
    plan: free          # free web service
    buildCommand: pip install -r requirements-hosting.txt
    startCommand: gunicorn run:app
    envVars:
      # Connects the web app to the shared database above.
      - key: DATABASE_URL
        fromDatabase:
          name: colony-db
          property: connectionString
      # A random secret is generated for you, used to secure the app.
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.12.6"
